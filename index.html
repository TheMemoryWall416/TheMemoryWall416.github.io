<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Memory Wall</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0b0c;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- TOP LEFT NAVIGATION --- */
        .top-nav {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 20px;
            z-index: 10;
        }

        .nav-link {
            background: none;
            border: none;
            color: #666666;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
            transition: color 0.2s ease;
            padding: 0;
        }

        .nav-link:hover {
            color: #ffffff;
        }

        /* --- FIXED HEADER CONTAINER --- */
        header {
            position: relative; 
            width: 100%;
            max-width: 1200px;
            height: 220px; /* FIXED: Holds enough space open vertically so nothing overlaps below */
            padding: 20px;
            box-sizing: border-box;
            margin-top: 20px;
            display: flex;
            justify-content: center; 
        }

        .header-center {
            text-align: center;
            max-width: 600px;
            z-index: 2;
        }

        /* Spotlight Showcase Card pinned absolutely to the left side */
        .spotlight-card {
            position: absolute;
            left: 20px;
            top: 60px; 
            width: 160px; 
            background-color: #16161a;
            border: 1px solid #33333b;
            border-radius: 8px;
            padding: 16px;
            display: flex;
            flex-direction: column; 
            align-items: center;
            text-align: center;
            box-sizing: border-box;
            transition: opacity 0.3s ease;
            opacity: 0; 
            z-index: 5;
        }

        .spotlight-card.visible {
            opacity: 1;
        }

        .spotlight-photo {
            width: 75px; 
            height: 75px;
            background-color: #222227;
            border: 1px solid #444;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        .spotlight-info {
            width: 100%;
            overflow: hidden;
        }

        .spotlight-title {
            font-size: 0.65rem;
            color: #666666;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
            font-weight: bold;
        }

        .spotlight-name {
            font-size: 1rem; 
            font-weight: bold;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 3px;
        }

        .spotlight-dates {
            font-size: 0.8rem;
            color: #888888;
        }

        body.pet-mode-active .spotlight-dates {
            color: #00ff88;
        }

        h1 {
            font-size: 1.8rem;
            margin: 0 0 5px 0;
            letter-spacing: 5px;
            color: #d1d1d1;
        }

        header p {
            color: #666666;
            font-size: 0.9rem;
            margin: 0 0 20px 0;
        }

        /* --- NAVIGATION CONTROLS --- */
        .controls-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .wall-toggle-switch {
            display: flex;
            background-color: #16161a;
            border: 1px solid #33333b;
            padding: 4px;
            border-radius: 30px;
        }

        .toggle-btn {
            background: none;
            border: none;
            color: #888888;
            padding: 8px 20px;
            font-size: 0.85rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .toggle-btn.active {
            background-color: #ffffff;
            color: #000000;
        }

        body.pet-mode-active .toggle-btn.active {
            background-color: #00ff88;
            color: #000000;
        }

        .add-brick-btn {
            background-color: #222227;
            color: #ffffff;
            border: 1px solid #444;
            padding: 8px 16px;
            font-size: 0.85rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .add-brick-btn:hover {
            border-color: #00ff88;
            color: #00ff88;
        }

        /* --- THE SLIDE WINDOW CONTAINER --- */
        .wall-viewport {
            width: 100%;
            max-width: 100vw;
            overflow-x: auto;
            padding: 10px 0 40px 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        .wall-viewport::-webkit-scrollbar { height: 8px; }
        .wall-viewport::-webkit-scrollbar-track { background: #111115; }
        .wall-viewport::-webkit-scrollbar-thumb { background: #33333b; border-radius: 4px; }
        .wall-viewport::-webkit-scrollbar-thumb:hover { background: #00ff88; }

        .wall-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 0 50px;
            width: max-content;
        }

        .wall-row {
            display: flex;
            gap: 4px;
        }

        .wall-row:nth-child(even) {
            transform: translateX(32px);
        }

        .brick-slot {
            width: 60px;
            height: 26px;
            border-radius: 1px;
            box-sizing: border-box;
            transition: all 0.15s ease;
            flex-shrink: 0;
        }

        .brick-slot.empty {
            background-color: transparent;
            border: 1px dashed #1c1c22;
        }

        .brick-slot.filled {
            background: linear-gradient(135deg, #241e1c 0%, #161312 100%);
            border: 1px solid #2e2624;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
        }

        .brick-slot.filled:hover {
            transform: scale(1.8);
            background: #ffffff;
            border-color: #ffffff;
            box-shadow: 0px 0px 15px rgba(255, 255, 255, 0.6);
            z-index: 100;
        }

        body.pet-mode-active .brick-slot.filled:hover {
            background: #00ff88;
            border-color: #ffffff;
            box-shadow: 0px 0px 15px rgba(0, 255, 136, 0.6);
        }

        .brick-slot.filled:hover .name {
            color: #000000;
            font-weight: bold;
        }

        .name {
            font-size: 0.45rem;
            letter-spacing: 0.2px;
            color: #a0a0a0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            padding: 0 2px;
            pointer-events: none;
        }

        /* --- POPUP MODALS --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 1000;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background-color: #16161a;
            border: 1px solid #33333b;
            border-radius: 8px;
            width: 90%;
            max-width: 320px;
            padding: 25px;
            text-align: center;
        }

        form { display: flex; flex-direction: column; gap: 12px; text-align: left; margin-top: 15px; }
        label { font-size: 0.8rem; color: #aaaaaa; }
        input, select, textarea { background-color: #222227; border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; font-size: 0.9rem; font-family: Arial, sans-serif; }
        textarea { resize: vertical; min-height: 80px; }
        select { cursor: pointer; }
        .submit-btn { background-color: #ffffff; color: black; border: none; padding: 10px; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        body.pet-mode-active .submit-btn { background-color: #00ff88; }
        .modal-photo { width: 80px; height: 80px; background-color: #222227; border: 1px solid #444; border-radius: 50%; margin: 0 auto 15px auto; display: flex; justify-content: center; align-items: center; font-size: 2rem; }
        .modal-name { font-size: 1.4rem; margin: 0 0 5px 0; color: white; }
        .modal-dates { font-size: 0.9rem; color: #aaaaaa; margin: 0 0 20px 0; }
        body.pet-mode-active .modal-dates { color: #00ff88; }
        .close-btn { background-color: #222227; color: #aaa; border: 1px solid #444; padding: 6px 15px; border-radius: 4px; cursor: pointer; }
        .close-btn:hover { background-color: #ff3344; color: white; }
        
        .about-text { text-align: left; font-size: 0.9rem; color: #cccccc; line-height: 1.5; margin-bottom: 20px; }

        /* Responsive safety fallback for small mobile screens */
        @media (max-width: 820px) {
            header { height: auto; display: flex; flex-direction: column; align-items: center; }
            .spotlight-card { position: relative; left: auto; top: auto; margin: 20px auto 10px auto; }
        }
    </style>
</head>

        <button class="nav-link" id="openAboutBtn">ABOUT</button>
        <button class="nav-link" id="openContactBtn">CONTACT</button>
    </nav>

        <div class="spotlight-card" id="spotlightCard">
            <div class="spotlight-photo" id="spotlightIcon">🕊️</div>
            <div class="spotlight-info">
                <div class="spotlight-title" id="spotlightTag">Spotlight</div>
                <div class="spotlight-name
