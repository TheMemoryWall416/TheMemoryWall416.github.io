<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Memory Wall</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        p {
            font-size: 1.2rem;
            color: #aaaaaa;
            max-width: 600px;
            line-height: 1.6;
        }
        .status {
            margin-top: 30px;
            padding: 10px 20px;
            background-color: #1e1e1e;
            border: 1px solid #333333;
            border-radius: 5px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #00ff88;
        }
    </style>
</head>
<body>

    <h1>THE MEMORY WALL</h1>
    <p>A global monument built to honor, remember, and celebrate the lives of those who live forever in our hearts.</p>
    
    <div class="status">System Online & Building</div>

</html>
