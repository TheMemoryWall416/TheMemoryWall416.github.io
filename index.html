<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Memory Wall</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0b0c;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 20px;
            max-width: 800px;
        }

        h1 {
            font-size: 1.8rem;
            margin: 0 0 5px 0;
            letter-spacing: 5px;
            color: #d1d1d1;
        }

        header p {
            color: #666666;
            font-size: 0.9rem;
            margin: 0 0 15px 0;
        }

        /* Action Button */
        .add-brick-btn {
            background-color: #00ff88;
            color: #000000;
            border: none;
            padding: 8px 16px;
            font-size: 0.85rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
        }

        .add-brick-btn:hover {
            transform: scale(1.05);
            background-color: #00cc6e;
        }

        /* The Perfect Brick Wall Container */
        .wall-container {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .wall-row {
            display: flex;
            gap: 4px;
            width: 100%;
            justify-content: center;
        }

        /* Micro Full Brick */
        .brick {
            width: 60px;
            height: 26px;
            background: linear-gradient(135deg, #241e1c 0%, #161312 100%);
            border: 1px solid #2e2624;
            border-radius: 1px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-sizing: border-box;
            transition: all 0.1s ease;
        }

        .brick-half {
            width: 28px;
            height: 26px;
            background: linear-gradient(135deg, #1f1a18 0%, #12100f 100%);
            border: 1px solid #241e1d;
            border-radius: 1px;
            box-sizing: border-box;
        }

        /* Hover Effect */
        .brick:hover {
            transform: scale(1.8);
            background: #00ff88;
            border-color: #ffffff;
            box-shadow: 0px 0px 15px rgba(0, 255, 136, 0.6);
            cursor: pointer;
            z-index: 100;
        }

        .brick:hover .name {
            color: #000000;
            font-weight: bold;
        }

        .name {
            font-size: 0.45rem;
            letter-spacing: 0.2px;
            color: #a0a0a0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            padding: 0 2px;
            pointer-events: none;
        }

        /* --- OVERLAY MODALS (Form & Viewer) --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 1000;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background-color: #16161a;
            border: 1px solid #33333b;
            border-radius: 8px;
            width: 90%;
            max-width: 320px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Form Styling */
        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            text-align: left;
            margin-top: 15px;
        }

        label {
            font-size: 0.8rem;
            color: #aaaaaa;
        }

        input {
            background-color: #222227;
            border: 1px solid #444;
            color: white;
            padding: 8px;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .submit-btn {
            background-color: #00ff88;
            color: black;
            border: none;
            padding: 10px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }

        .modal-photo {
            width: 80px;
            height: 80px;
            background-color: #222227;
            border: 1px solid #444;
            border-radius: 50%;
            margin: 0 auto 15px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
        }

        .modal-name { font-size: 1.4rem; margin: 0 0 5px 0; }
        .modal-dates { font-size: 0.9rem; color: #00ff88; margin: 0 0 20px 0; }
        .close-btn { background-color: #222227; color: #aaa; border: 1px solid #444; padding: 6px 15px; border-radius: 4px; cursor: pointer; }
        .close-btn:hover { background-color: #ff3344; color: white; }
    </style>
</head>
<body>

    <header>
        <h1>THE MEMORY WALL</h1>
        <p>A massive, microscopic interlocking global monument.</p>
        <button class="add-brick-btn" id="openFormBtn">+ Add a Brick</button>
    </header>

    <div class="wall-container" id="wallContainer">
        <div class="wall-row">
            <div class="brick" data-full-name="John Doe" data-years="1950 - 2024"><div class="name">J.Doe</div></div>
            <div class="brick" data-full-name="Alice Smith" data-years="1965 - 2023"><div class="name">A.Smith</div></div>
            <div class="brick" data-full-name="Robert Johnson" data-years="1942 - 2025"><div class="name">R.Johns</div></div>
        </div>
        <div class="wall-row">
            <div class="brick-half"></div>
            <div class="brick" data-full-name="James Anderson" data-years="1981 - 2022"><div class="name">J.Ande</div></div>
            <div class="brick" data-full-name="Clara Taylor" data-years="1939 - 2016"><div class="name">C.Tayl</div></div>
            <div class="brick-half"></div>
        </div>
    </div>

    <div class="modal-overlay" id="viewModal">
        <div class="modal-card">
            <div class="modal-photo">🕊️</div>
            <h2 class="modal-name" id="modalName">Name</h2>
            <div class="modal-dates" id="modalDates">Years</div>
            <button class="close-btn" id="closeViewBtn">Close</button>
        </div>
    </div>

    <div class="modal-overlay" id="formModal">
        <div class="modal-card">
            <h3 style="margin: 0; letter-spacing: 1px;">LAY A NEW BRICK</h3>
            <form id="brickForm">
                <label>Full Name</label>
                <input type="text" id="inputName" placeholder="e.g. Jane Miller" required>
                
                <label>Years (e.g. 1960 - 2026)</label>
                <input type="text" id="inputYears" placeholder="e.g. 1960 - 2026" required>
                
                <button type="submit" class="submit-btn">Place onto Wall</button>
            </form>
            <button class="close-btn" id="closeFormBtn" style="margin-top: 15px; width: 100%;">Cancel</button>
        </div>
    </div>

    <script>
        const wallContainer = document.getElementById('wallContainer');
        const viewModal = document.getElementById('viewModal');
        const formModal = document.getElementById('formModal');
        const modalName = document.getElementById('modalName');
        const modalDates = document.getElementById('modalDates');

        // Open/Close Form Modal
        document.getElementById('openFormBtn').addEventListener('click', () => formModal.classList.add('active'));
        document.getElementById('closeFormBtn').addEventListener('click', () => formModal.classList.remove('active'));

        // Close View Modal
        document.getElementById('closeViewBtn').addEventListener('click', () => viewModal.classList.remove('active'));

        // Handle clicking on bricks (delegated to container so new bricks work automatically!)
        wallContainer.addEventListener('click', (e) => {
            const brick = e.target.closest('.brick');
            if (brick) {
                modalName.textContent = brick.getAttribute('data-full-name');
                modalDates.textContent = brick.getAttribute('data-years');
                viewModal.classList.add('active');
            }
        });

        // Form submission to dynamically create a brick
        document.getElementById('brickForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const name = document.getElementById('inputName').value;
            const years = document.getElementById('inputYears').value;

            // Generate short display name (e.g., "Jane Miller" -> "J.Mill")
            const nameParts = name.trim().split(' ');
            let shortName = name;
            if (nameParts.length > 1) {
                shortName = nameParts[0][0] + '.' + nameParts[nameParts.length - 1].substring(0, 4);
            } else {
                shortName = name.substring(0, 6);
            }

            // Create brick elements
            const newBrick = document.createElement('div');
            newBrick.className = 'brick';
            newBrick.setAttribute('data-full-name', name);
            newBrick.setAttribute('data-years', years);
            
            const nameDiv = document.createElement('div');
            nameDiv.className = 'name';
            nameDiv.textContent = shortName;
            newBrick.appendChild(nameDiv);

            // Find the last row to place it in, or make a new row if it gets full
            let rows = wallContainer.querySelectorAll('.wall-row');
            let targetRow = rows[rows.length - 1];
            
            // To maintain interlocking design, check how many elements are in the row
            // If the row has 6 items, let's start a new row!
            const brickCount = targetRow.querySelectorAll('.brick').length;
            if (brickCount >= 6) {
                const newRow = document.createElement('div');
                newRow.className = 'wall-row';
                
                // If the previous row was standard, make this one interlocking (add half bricks)
                if (!targetRow.querySelector('.brick-half')) {
                    const half1 = document.createElement('div');
                    half1.className = 'brick-half';
                    const half2 = document.createElement('div');
                    half2.className = 'brick-half';
                    newRow.appendChild(half1);
                    newRow.appendChild(newBrick);
                    newRow.appendChild(half2);
                } else {
                    newRow.appendChild(newBrick);
                }
                wallContainer.appendChild(newRow);
            } else {
                // Insert right before the trailing half-brick if it's an offset row
                const trailingHalf = targetRow.querySelector('.brick-half:last-child');
                if (trailingHalf) {
                    targetRow.insertBefore(newBrick, trailingHalf);
                } else {
                    targetRow.appendChild(newBrick);
                }
            }

            // Reset form and close
            document.getElementById('brickForm').reset();
            formModal.classList.remove('active');
        });

        // Close if clicking outside cards
        window.addEventListener('click', (e) => {
            if (e.target === viewModal) viewModal.classList.remove('active');
            if (e.target === formModal) formModal.classList.remove('active');
        });
    </script>
</body>
</html>
