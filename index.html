<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Memory Wall</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* --- CORE FOUNDATION --- */
        html, body { max-width: 100vw; overflow-x: hidden; width: 100%; margin: 0; padding: 0; background-color: #0b0b0c; color: #ffffff; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* --- NAVIGATION --- */
        .top-nav { position: absolute; top: 20px; left: 20px; display: flex; gap: 20px; z-index: 10; }
        .nav-link { background: none; border: none; color: #666666; font-size: 0.85rem; font-weight: bold; cursor: pointer; letter-spacing: 1px; transition: color 0.2s; padding: 0; }
        .nav-link:hover { color: #ffffff; }

        /* --- HEADER --- */
        header { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 1600px; padding: 20px; box-sizing: border-box; margin-top: 40px; margin-bottom: 25px; gap: 15px; }
        .spotlight-side { display: flex; gap: 12px; flex: 1; }
        .left-side { justify-content: flex-end; }
        .right-side { justify-content: flex-start; }
        .header-center { text-align: center; width: 100%; max-width: 480px; flex-shrink: 0; z-index: 2; }

        /* --- SPOTLIGHT CARDS --- */
        .spotlight-card { width: 135px; background-color: #16161a; border: 1px solid #33333b; border-radius: 8px; padding: 12px 8px; display: flex; flex-direction: column; align-items: center; text-align: center; transition: opacity 0.4s ease; opacity: 0; }
        .spotlight-card.visible { opacity: 1; }
        .spotlight-photo { width: 55px; height: 55px; background-color: #222227; border: 1px solid #444; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.4rem; margin-bottom: 8px; background-size: cover; background-position: center; }
        .spotlight-info { width: 100%; overflow: hidden; }
        .spotlight-title { font-size: 0.55rem; color: #666666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; font-weight: bold; }
        .spotlight-name { font-size: 0.85rem; font-weight: bold; color: #ffffff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
        .spotlight-dates { font-size: 0.65rem; color: #888888; }
        .volume-slider { width: 90%; margin-top: 6px; background: #222227; height: 4px; border-radius: 2px; -webkit-appearance: none; }
        .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; border-radius: 50%; background: #666666; cursor: pointer; }

        /* --- WALL CONTROLS --- */
        .controls-container { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-bottom: 10px; }
        .wall-toggle-switch { display: flex; background-color: #16161a; border: 1px solid #33333b; padding: 4px; border-radius: 30px; width: 100%; justify-content: space-between; }
        .toggle-btn { background: none; border: none; color: #888888; padding: 8px 15px; font-size: 0.75rem; font-weight: bold; border-radius: 20px; cursor: pointer; flex: 1; }
        .toggle-btn.active { background-color: #ffffff; color: #000000; }
        .add-brick-btn { background-color: #222227; color: #ffffff; border: 1px solid #444; padding: 8px 24px; font-size: 0.85rem; font-weight: bold; border-radius: 30px; cursor: pointer; }
        
        /* --- WALL GRID --- */
        .wall-viewport { width: 100vw; max-width: 100%; overflow-x: auto; padding: 10px 0 30px 0; }
        .wall-container { display: flex; flex-direction: column; gap: 4px; padding: 0 50px; width: max-content; }
        .wall-row { display: flex; gap: 4px; }
        .wall-row:nth-child(even) { transform: translateX(32px); }
        .brick-slot { width: 60px; height: 26px; border-radius: 1px; flex-shrink: 0; }
        .brick-slot.empty { border: 1px dashed #1c1c22; }
        .brick-slot.filled { background: linear-gradient(135deg, #241e1c 0%, #161312 100%); border: 1px solid #2e2624; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .name { font-size: 0.45rem; color: #a0a0a0; white-space: nowrap; overflow: hidden; }

        /* --- MODALS --- */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:flex; justify-content:center; align-items:center; opacity:0; pointer-events:none; z-index:1000; }
        .modal-overlay.active { opacity:1; pointer-events:auto; }
        .modal-card { background:#16161a; border:1px solid #33333b; border-radius:8px; width:90%; max-width:440px; padding:25px; }
        form { display:flex; flex-direction:column; gap:14px; text-align:left; margin-top:15px; }
        input, select, textarea { background:#222227; border:1px solid #444; color:white; padding:10px; border-radius:4px; width:100%; }
        .submit-btn { background:#ffffff; color:black; border:none; padding:12px; border-radius:4px; cursor:pointer; }
        .close-btn { background:#222227; color:#aaa; border:1px solid #444; padding:10px; border-radius:4px; cursor:pointer; width:100%; margin-top:15px; }
        .about-text { text-align:left; font-size:0.9rem; color:#cccccc; line-height:1.5; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <button class="nav-link" id="openAboutBtn">ABOUT</button>
        <button class="nav-link" id="openFounderBtn">VISION</button>
        <button class="nav-link" id="openContactBtn">CONTACT</button>
    </nav>

    <header>
        <div class="spotlight-side left-side">
            <div class="spotlight-card" id="spotlight0"><div class="spotlight-photo">🕊️</div><div class="spotlight-info"><div class="spotlight-title">Spotlight</div><div class="spotlight-name">...</div><div class="spotlight-dates">...</div></div></div>
            <div class="spotlight-card" id="spotlight1"><div class="spotlight-photo">🕊️</div><div class="spotlight-info"><div class="spotlight-title">Spotlight</div><div class="spotlight-name">...</div><div class="spotlight-dates">...</div></div></div>
            <div class="spotlight-card" id="spotlight2"><div class="spotlight-photo">🕊️</div><div class="spotlight-info"><div class="spotlight-title">Spotlight</div><div class="spotlight-name">...</div><div class="spotlight-dates">...</div></div></div>
        </div>

        <div class="header-center">
            <h1>THE MEMORY WALL</h1>
            <p>A global monument stretching infinitely into the horizon.</p>
            <div class="controls-container">
                <div class="wall-toggle-switch">
                    <button class="toggle-btn active" id="humanWallBtn">Lives Remembered</button>
                    <button class="toggle-btn" id="gentleWallBtn">Gentle Arrivals</button>
                    <button class="toggle-btn" id="rainbowWallBtn">Rainbow Bridge</button>
                </div>
                <button class="add-brick-btn" id="openFormBtn">+ Add Brick</button>
            </div>
            <div id="brickCounter" style="font-size: 0.9rem; font-weight: bold; margin-top: 10px;">Souls Honored: 0</div>
        </div>

        <div class="spotlight-side right-side">
            <div class="spotlight-card" id="spotlight3"><div class="spotlight-photo">🕊️</div><div class="spotlight-info"><div class="spotlight-title">Spotlight</div><div class="spotlight-name">...</div><div class="spotlight-dates">...</div></div></div>
            <div class="spotlight-card" id="spotlight4"><div class="spotlight-photo">🕊️</div><div class="spotlight-info"><div class="spotlight-title">Spotlight</div><div class="spotlight-name">...</div><div class="spotlight-dates">...</div></div></div>
            <div class="spotlight-card visible" id="spotlight5">
                <div class="spotlight-photo">🔇</div>
                <div class="spotlight-info">
                    <div class="spotlight-title">Atmosphere</div>
                    <div class="spotlight-name" style="font-size:0.7rem; color:#666;">Volume: Off</div>
                    <input type="range" class="volume-slider" min="0" max="100" value="0">
                </div>
            </div>
        </div>
    </header>

    <div class="wall-viewport" id="wallViewport"><div class="wall-container" id="wallContainer"></div></div>

    <div class="modal-overlay" id="viewModal">
        <div class="modal-card">
            <h2 id="modalName">Name</h2>
            <p id="modalDates"></p>
            <div id="modalBio" class="about-text"></div>
            <button class="close-btn" id="closeViewBtn">Close</button>
        </div>
    </div>

    <div class="modal-overlay" id="formModal">
        <div class="modal-card">
            <h3 id="formTitle">LAY A BRICK</h3>
            <form id="brickForm">
                <input type="text" id="inputName" placeholder="Full Name" required>
                <input type="date" id="inputDOB">
                <input type="date" id="inputDOD">
                <select id="inputCountry"><option value="South Africa">South Africa</option></select>
                <textarea id="inputBio" placeholder="Biography..."></textarea>
                <button type="submit" class="submit-btn">Place onto Wall</button>
            </form>
            <button class="close-btn" id="closeFormBtn">Cancel</button>
        </div>
    </div>

    <script>
        /* ==========================================
           2. SUPABASE INITIALIZATION
           Replace the placeholder text inside the quotes 
           with your actual URL and Anon Key.
           ========================================== */
        const SUPABASE_URL = 'https://cajspoanzahtrqugbkvp.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNhanNwb2FuemFodHJxdWdia3ZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1NDU2MjAsImV4cCI6MjA5NzEyMTYyMH0.zAvg8fef33RqYyUtQc9GpeZGP8NrkpkesKcx2cji1sg';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        /* --- CORE VARIABLES --- */
        const wallContainer = document.getElementById('wallContainer');
        let currentSection = 'human'; 
        let activeWallData = [];

        /* --- GRID BUILDING --- */
        function initGrid() {
            wallContainer.innerHTML = ''; // Clear previous
            for (let i = 0; i < 10; i++) {
                const row = document.createElement('div');
                row.className = 'wall-row';
                for (let j = 0; j < 60; j++) {
                    const slot = document.createElement('div');
                    slot.className = 'brick-slot empty';
                    row.appendChild(slot);
                }
                wallContainer.appendChild(row);
            }
        }

        /* --- NEW: FETCH DATA FROM SUPABASE (We will build the inside of this next) --- */
        async function loadAndRenderWall() {
            initGrid();
            activeWallData = [];
            
            console.log("Preparing to fetch from Supabase. Section:", currentSection);
            
            // This is where our new database pull will go!
            
            document.getElementById('brickCounter').textContent = `Souls Honored: ${activeWallData.length}`;
        }

        /* --- EVENT LISTENERS --- */
        document.addEventListener('DOMContentLoaded', () => {
            loadAndRenderWall();
            
            document.getElementById('openFormBtn').addEventListener('click', () => document.getElementById('formModal').classList.add('active'));
            document.getElementById('closeFormBtn').addEventListener('click', () => document.getElementById('formModal').classList.remove('active'));
            document.getElementById('closeViewBtn').addEventListener('click', () => document.getElementById('viewModal').classList.remove('active'));
        });

    </script>
</body>
</html>
