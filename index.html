<!DOCTYPE html>
<html>
<head>
    <title>Memory Wall</title>
    <style>
        body { background: #0b0b0c; color: white; font-family: sans-serif; text-align: center; }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .brick { border: 1px solid #333; padding: 10px; margin: 5px; display: inline-block; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div>
            <input type="password" id="passInput" placeholder="Password...">
            <button onclick="checkPass()">Enter</button>
        </div>
    </div>

    <h1>Memory Wall</h1>
    <input id="brickInput" placeholder="Write a memory...">
    <button onclick="saveBrick()">Add Brick</button>
    <div id="wall"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // --- PASTE YOUR CONFIG HERE ---
        const firebaseConfig = { 
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Password Check
        window.checkPass = () => {
            if(document.getElementById('passInput').value === "1234") { // Change this password
                document.getElementById('login-screen').style.display = 'none';
            }
        };

        // Add Memory
        window.saveBrick = async () => {
            const text = document.getElementById('brickInput').value;
            await addDoc(collection(db, "bricks"), { text: text, date: Date.now() });
        };

        // Real-time Update
        onSnapshot(collection(db, "bricks"), (snapshot) => {
            const wall = document.getElementById('wall');
            wall.innerHTML = '';
            snapshot.forEach(doc => {
                const div = document.createElement('div');
                div.className = 'brick';
                div.textContent = doc.data().text;
                wall.appendChild(div);
            });
        });
    </script>
</body>
</html>
