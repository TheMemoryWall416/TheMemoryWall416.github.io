<!DOCTYPE html>
<html>
<head>
    <title>Memory Wall</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        
        /* The Wall Grid */
        #wall { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); 
            gap: 15px; 
            width: 90%; 
            max-width: 800px;
            margin-top: 20px;
        }

        /* The Brick Style */
        .brick { 
            background: #333; 
            padding: 20px; 
            border-radius: 4px; 
            border-left: 5px solid #ffcc00; 
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            word-wrap: break-word;
        }

        /* The Input Area */
        .controls { margin-top: 30px; padding: 20px; background: #222; border-radius: 8px; }
        input { padding: 10px; width: 250px; }
    </style>
</head>
<body>

    <div class="controls">
        <h1>Memory Wall</h1>
        <input id="brickInput" placeholder="Enter a memory...">
        <button onclick="saveBrick()">Add Brick</button>
    </div>

    <div id="wall"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = { /* YOUR EXISTING CONFIG HERE */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.saveBrick = async () => {
            const text = document.getElementById('brickInput').value;
            if (text.trim() === "") return; // Don't add empty bricks
            await addDoc(collection(db, "bricks"), { text: text, createdAt: Date.now() });
            document.getElementById('brickInput').value = '';
        };

        // Get bricks ordered by time
        const q = query(collection(db, "bricks"), orderBy("createdAt", "desc"));

        onSnapshot(q, (snapshot) => {
            const wall = document.getElementById('wall');
            wall.innerHTML = '';
            snapshot.forEach(doc => {
                const div = document.createElement('div');
                div.className = 'brick';
                div.textContent = doc.data().text;
                wall.appendChild(div);
            });
        });
    </script>
</body>
</html>
