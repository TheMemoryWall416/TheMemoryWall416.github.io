<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Memory Wall</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0b0c;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            padding: 20px;
            max-width: 800px;
        }

        h1 {
            font-size: 1.8rem;
            margin: 0 0 5px 0;
            letter-spacing: 5px;
            color: #d1d1d1;
        }

        header p {
            color: #666666;
            font-size: 0.9rem;
            margin: 0 0 20px 0;
        }

        /* --- NAVIGATION CONTROLS --- */
        .controls-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .wall-toggle-switch {
            display: flex;
            background-color: #16161a;
            border: 1px solid #33333b;
            padding: 4px;
            border-radius: 30px;
        }

        .toggle-btn {
            background: none;
            border: none;
            color: #888888;
            padding: 8px 20px;
            font-size: 0.85rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .toggle-btn.active {
            background-color: #ffffff;
            color: #000000;
        }

        body.pet-mode-active .toggle-btn.active {
            background-color: #00ff88;
            color: #000000;
        }

        .add-brick-btn {
            background-color: #222227;
            color: #ffffff;
            border: 1px solid #444;
            padding: 8px 16px;
            font-size: 0.85rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .add-brick-btn:hover {
            border-color: #00ff88;
            color: #00ff88;
        }

        /* --- THE SLIDE WINDOW CONTAINER --- */
        .wall-viewport {
            width: 100%;
            max-width: 100vw;
            overflow-x: auto;
            padding: 40px 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        .wall-viewport::-webkit-scrollbar { height: 8px; }
        .wall-viewport::-webkit-scrollbar-track { background: #111115; }
        .wall-viewport::-webkit-scrollbar-thumb { background: #33333b; border-radius: 4px; }
        .wall-viewport::-webkit-scrollbar-thumb:hover { background: #00ff88; }

        .wall-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 0 50px;
            width: max-content;
        }

        .wall-row {
            display: flex;
            gap: 4px;
        }

        .wall-row:nth-child(even) {
            transform: translateX(32px);
        }

        .brick-slot {
            width: 60px;
            height: 26px;
            border-radius: 1px;
            box-sizing: border-box;
            transition: all 0.15s ease;
        }

        .brick-slot.empty {
            background-color: transparent;
            border: 1px dashed #1c1c22;
        }

        .brick-slot.filled {
            background: linear-gradient(135deg, #241e1c 0%, #161312 100%);
            border: 1px solid #2e2624;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
        }

        .brick-slot.filled:hover {
            transform: scale(1.8);
            background: #ffffff;
            border-color: #ffffff;
            box-shadow: 0px 0px 15px rgba(255, 255, 255, 0.6);
            z-index: 100;
        }

        body.pet-mode-active .brick-slot.filled:hover {
            background: #00ff88;
            border-color: #ffffff;
            box-shadow: 0px 0px 15px rgba(0, 255, 136, 0.6);
        }

        .brick-slot.filled:hover .name {
            color: #000000;
            font-weight: bold;
        }

        .name {
            font-size: 0.45rem;
            letter-spacing: 0.2px;
            color: #a0a0a0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            padding: 0 2px;
            pointer-events: none;
        }

        /* --- POPUP MODALS --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 1000;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background-color: #16161a;
            border: 1px solid #33333b;
            border-radius: 8px;
            width: 90%;
            max-width: 320px;
            padding: 25px;
            text-align: center;
        }

        form { display: flex; flex-direction: column; gap: 12px; text-align: left; margin-top: 15px; }
        label { font-size: 0.8rem; color: #aaaaaa; }
        input { background-color: #222227; border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; font-size: 0.9rem; }
        .submit-btn { background-color: #ffffff; color: black; border: none; padding: 10px; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        body.pet-mode-active .submit-btn { background-color: #00ff88; }
        .modal-photo { width: 80px; height: 80px; background-color: #222227; border: 1px solid #444; border-radius: 50%; margin: 0 auto 15px auto; display: flex; justify-content: center; align-items: center; font-size: 2rem; }
        .modal-name { font-size: 1.4rem; margin: 0 0 5px 0; color: white; }
        .modal-dates { font-size: 0.9rem; color: #aaaaaa; margin: 0 0 20px 0; }
        body.pet-mode-active .modal-dates { color: #00ff88; }
        .close-btn { background-color: #222227; color: #aaa; border: 1px solid #444; padding: 6px 15px; border-radius: 4px; cursor: pointer; }
        .close-btn:hover { background-color: #ff3344; color: white; }
    </style>
</head>
<body>

    <header>
        <h1>THE MEMORY WALL</h1>
        <p>A global monument stretching infinitely into the horizon.</p>
        
        <div class="controls-container">
            <div class="wall-toggle-switch">
                <button class="toggle-btn active" id="humanWallBtn">Human Monument</button>
                <button class="toggle-btn" id="petWallBtn">Animal Wall</button>
            </div>
            <button class="add-brick-btn" id="openFormBtn">+ Add Brick</button>
        </div>
    </header>

    <div class="wall-viewport">
        <div class="wall-container" id="wallContainer">
            <div class="wall-row" data-row-index="1"></div>
            <div class="wall-row" data-row-index="2"></div>
            <div class="wall-row" data-row-index="3"></div>
            <div class="wall-row" data-row-index="4"></div>
            <div class="wall-row" data-row-index="5"></div>
            <div class="wall-row" data-row-index="6"></div>
            <div class="wall-row" data-row-index="7"></div>
            <div class="wall-row" data-row-index="8"></div>
            <div class="wall-row" data-row-index="9"></div>
            <div class="wall-row" data-row-index="10"></div>
        </div>
    </div>

    <div class="modal-overlay" id="viewModal">
        <div class="modal-card">
            <div class="modal-photo" id="modalIcon">🕊️</div>
            <h2 class="modal-name" id="modalName">Name</h2>
            <div class="modal-dates" id="modalDates">Years</div>
            <button class="close-btn" id="closeViewBtn">Close</button>
        </div>
    </div>

    <div class="modal-overlay" id="formModal">
        <div class="modal-card">
            <h3 id="formTitle" style="margin: 0; letter-spacing: 1px;">LAY A HUMAN BRICK</h3>
            <form id="brickForm">
                <label>Full Name</label>
                <input type="text" id="inputName" placeholder="e.g. Samuel Evans" required>
                
                <label>Years</label>
                <input type="text" id="inputYears" placeholder="e.g. 1945 - 2026" required>
                
                <button type="submit" class="submit-btn">Place onto Wall</button>
            </form>
            <button class="close-btn" id="closeFormBtn" style="margin-top: 15px; width: 100%;">Cancel</button>
        </div>
    </div>

    <script>
        const wallContainer = document.getElementById('wallContainer');
        const viewModal = document.getElementById('viewModal');
        const formModal = document.getElementById('formModal');
        const modalName = document.getElementById('modalName');
        const modalDates = document.getElementById('modalDates');
        const modalIcon = document.getElementById('modalIcon');
        const closeViewBtn = document.getElementById('closeViewBtn');
        
        const humanWallBtn = document.getElementById('humanWallBtn');
        const petWallBtn = document.getElementById('petWallBtn');
        const formTitle = document.getElementById('formTitle');

        const initialColumns = 60;
        let currentSection = 'human'; // Tracks our view: 'human' or 'animal'

        // 1. Build out the blank skeletal spaces
        function resetSkeletonGrid() {
            const rows = wallContainer.querySelectorAll('.wall-row');
            rows.forEach(row => {
                row.innerHTML = '';
                for (let i = 0; i < initialColumns; i++) {
                    const slot = document.createElement('div');
                    slot.className = 'brick-slot empty';
                    row.appendChild(slot);
                }
            });
        }

        // Find next empty grid space from bottom-to-top
        function findNextEmptySlot() {
            let targetSlot = null;
            for (let col = 0; col < initialColumns; col++) {
                for (let r = 10; r >= 1; r--) {
                    const row = wallContainer.querySelector(`[data-row-index="${r}"]`);
                    const slot = row.children[col];
                    if (slot.classList.contains('empty')) {
                        targetSlot = slot;
                        break;
                    }
                }
                if (targetSlot) break;
            }
            return targetSlot;
        }

        function populateSlot(slot, name, years, section) {
            const nameParts = name.trim().split(' ');
            let shortName = name;
            if (nameParts.length > 1) {
                shortName = nameParts[0][0] + '.' + nameParts[nameParts.length - 1].substring(0, 4);
            } else {
                shortName = name.substring(0, 6);
            }

            slot.classList.remove('empty');
            slot.classList.add('filled');
            slot.setAttribute('data-full-name', name);
            slot.setAttribute('data-years', years);
            slot.setAttribute('data-section', section);
            
            const nameDiv = document.createElement('div');
            nameDiv.className = 'name';
            nameDiv.textContent = shortName;
            slot.appendChild(nameDiv);
        }

        // 2. Fetch data file dynamically depending on which switch is active
        function loadAndRenderWall() {
            resetSkeletonGrid();
            
            // Choose file name dynamically based on section state
            const targetFile = currentSection === 'human' ? 'human-data.json' : 'animal-data.json';
            
            fetch(targetFile)
                .then(response => response.json())
                .then(data => {
                    data.forEach(item => {
                        const targetSlot = findNextEmptySlot();
                        if (targetSlot) {
                            populateSlot(targetSlot, item.name, item.years, currentSection);
                        }
                    });
                })
                .catch(err => console.error("Error reading ledger file:", err));
        }

        // Load human wall out of the box
        loadAndRenderWall();

        // 3. Tab Switching Events
        humanWallBtn.addEventListener('click', () => {
            if (currentSection === 'human') return;
            currentSection = 'human';
            document.body.classList.remove('pet-mode-active');
            humanWallBtn.classList.add('active');
            petWallBtn.classList.remove('active');
            loadAndRenderWall();
        });

        petWallBtn.addEventListener('click', () => {
            if (currentSection === 'animal') return;
            currentSection = 'animal';
            document.body.classList.add
