<!DOCTYPE html>

    <title>The Memory Wall</title>
    <style>
        body { margin: 0; background-color: #0b0b0c; color: #ffffff; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .wall-container { display: flex; flex-direction: column; gap: 4px; padding: 50px; }
        .wall-row { display: flex; gap: 4px; }
        .brick-slot { width: 60px; height: 26px; border: 1px dashed #333; }
        .brick-slot.filled { background: #333; border: 1px solid #555; }
    </style>
</head>
<body>
    <h1>THE MEMORY WALL</h1>

    </div>

        const SUPABASE_URL = 'https://yojxagqrxpjuwjanczah.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlvanhhZ3FyeHBqdXdqYW5jemFoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NjM0MDgsImV4cCI6MjA5NjMzOTQwOH0.QZds9Ssj0rJ2yMhLo9XTGENVa_DraETfiBfBa03FBaQ';
