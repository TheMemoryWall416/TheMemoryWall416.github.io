<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Memory Wall</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            max-width: 800px;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            letter-spacing: 3px;
        }

        header p {
            color: #aaaaaa;
            font-size: 1.1rem;
            line-height: 1.6;
            margin: 0;
        }

        /* The Grid Container */
        .wall-container {
            width: 90%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            padding: 20px;
            margin-bottom: 50px;
        }

        /* Individual Brick Design */
        .brick {
            background-color: #1e1e1e;
            border: 1px solid #333333;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            transition: transform 0.2s, border-color 0.2s;
        }

        /* Hover Effect to make it feel alive */
        .brick:hover {
            transform: translateY(-5px);
            border-color: #00ff88;
            cursor: pointer;
        }

        .photo-placeholder {
            width: 80px;
            height: 80px;
            background-color: #2a2a2a;
            border-radius: 50%;
            margin: 0 auto 15px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666666;
            font-size: 1.5rem;
        }

        .brick h3 {
            margin: 0 0 5px 0;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .brick p {
            margin: 0;
            color: #888888;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>THE MEMORY WALL</h1>
        <p>A global monument built to honor, remember, and celebrate the lives of those who live forever in our hearts.</p>
    </header>

    <div class="wall-container">
        
        <div class="brick">
            <div class="photo-placeholder">🕊️</div>
            <h3>John Doe</h3>
            <p>1950 - 2024</p>
        </div>

        <div class="brick">
            <div class="photo-placeholder">🕊️</div>
            <h3>Jane Smith</h3>
            <p>1965 - 2023</p>
        </div>

        <div class="brick">
            <div class="photo-placeholder">🕊️</div>
            <h3>Robert Johnson</h3>
            <p>1942 - 2025</p>
        </div>

        <div class="brick">
            <div class="photo-placeholder">🕊️</div>
            <h3>Mary Williams</h3>
            <p>1978 - 2024</p>
        </div>

    </div>

</body>
</html>
