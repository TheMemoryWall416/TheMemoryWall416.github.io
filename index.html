<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Memory Wall</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0b0c;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            padding: 20px;
            max-width: 800px;
        }

        h1 {
            font-size: 1.8rem;
            margin: 0 0 5px 0;
            letter-spacing: 5px;
            color: #d1d1d1;
        }

        header p {
            color: #666666;
            font-size: 0.9rem;
            margin: 0 0 15px 0;
        }

        /* --- THE SLIDE WINDOW CONTAINER --- */
        .wall-viewport {
            width: 100%;
            max-width: 100vw;
            overflow-x: auto;
            padding: 40px 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        .wall-viewport::-webkit-scrollbar { height: 8px; }
        .wall-viewport::-webkit-scrollbar-track { background: #111115; }
        .wall-viewport::-webkit-scrollbar-thumb { background: #33333b; border-radius: 4px; }
        .wall-viewport::-webkit-scrollbar-thumb:hover { background: #00ff88; }

        .wall-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 0 50px;
            width: max-content;
        }

        .wall-row {
            display: flex;
            gap: 4px;
        }

        .wall-row:nth-child(even) {
            transform: translateX(32px);
        }

        .brick-slot {
            width: 60px;
            height: 26px;
            border-radius: 1px;
            box-sizing: border-box;
            transition: all 0.15s ease;
        }

        .brick-slot.empty {
            background-color: transparent;
            border: 1px dashed #1c1c22;
        }

        .brick-slot.filled {
            background: linear-gradient(135deg, #241e1c 0%, #161312 100%);
            border: 1px solid #2e2624;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
        }

        .brick-slot.filled:hover {
            transform: scale(1.8);
            background: #00ff88;
            border-color: #ffffff;
            box-shadow: 0px 0px 15px rgba(0, 255, 136, 0.6);
            z-index: 100;
        }

        .brick-slot.filled:hover .name {
            color: #000000;
            font-weight: bold;
        }

        .name {
            font-size: 0.45rem;
            letter-spacing: 0.2px;
            color: #a0a0a0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            padding: 0 2px;
            pointer-events: none;
        }

        /* --- POPUP MODAL --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 1000;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background-color: #16161a;
            border: 1px solid #33333b;
            border-radius: 8px;
            width: 90%;
            max-width: 320px;
            padding: 25px;
            text-align: center;
        }

        .modal-photo { width: 80px; height: 80px; background-color: #222227; border: 1px solid #444; border-radius: 50%; margin: 0 auto 15px auto; display: flex; justify-content: center; align-items: center; font-size: 2rem; }
        .modal-name { font-size: 1.4rem; margin: 0 0 5px 0; color: white; }
        .modal-dates { font-size: 0.9rem; color: #00ff88; margin: 0 0 20px 0; }
        .close-btn { background-color: #222227; color: #aaa; border: 1px solid #444; padding: 6px 15px; border-radius: 4px; cursor: pointer; }
        .close-btn:hover { background-color: #ff3344; color: white; }
    </style>
</head>
<body>

    <header>
        <h1>THE MEMORY WALL</h1>
        <p>A global monument powered by our live data ledger.</p>
    </header>

    <div class="wall-viewport">
        <div class="wall-container" id="wallContainer">
            <div class="wall-row" data-row-index="1"></div>
            <div class="wall-row" data-row-index="2"></div>
            <div class="wall-row" data-row-index="3"></div>
            <div class="wall-row" data-row-index="4"></div>
            <div class="wall-row" data-row-index="5"></div>
            <div class="wall-row" data-row-index="6"></div>
            <div class="wall-row" data-row-index="7"></div>
            <div class="wall-row" data-row-index="8"></div>
            <div class="wall-row" data-row-index="9"></div>
            <div class="wall-row" data-row-index="10"></div>
        </div>
    </div>

    <div class="modal-overlay" id="viewModal">
        <div class="modal-card">
            <div class="modal-photo" id="modalIcon">🕊️</div>
            <h2 class="modal-name" id="modalName">Name</h2>
            <div class="modal-dates" id="modalDates">Years</div>
            <button class="close-btn" id="closeViewBtn">Close</button>
        </div>
    </div>

    <script>
        const wallContainer = document.getElementById('wallContainer');
        const viewModal = document.getElementById('viewModal');
        const modalName = document.getElementById('modalName');
        const modalDates = document.getElementById('modalDates');
        const modalIcon = document.getElementById('modalIcon');
        const closeViewBtn = document.getElementById('closeViewBtn');

        // 1. Preload 60 empty columns across all 10 rows
        const initialColumns = 60;
        const rows = wallContainer.querySelectorAll('.wall-row');
        rows.forEach(row => {
            for (let i = 0; i < initialColumns; i++) {
                const slot = document.createElement('div');
                slot.className = 'brick-slot empty';
                row.appendChild(slot);
            }
        });

        // 2. Fetch the data ledger and automatically build the bricks
        fetch('wall-data.json')
            .then(response => response.json())
            .then(data => {
                data.forEach(item => {
                    // Generate shortened name for micro layout
                    const nameParts = item.name.trim().split(' ');
                    let shortName = item.name;
                    if (nameParts.length > 1) {
                        shortName = nameParts[0][0] + '.' + nameParts[nameParts.length - 1].substring(0, 4);
                    } else {
                        shortName = item.name.substring(0, 6);
                    }

                    // Find the first available empty slot from bottom-to-top, left-to-right
                    let targetSlot = null;
                    for (let col = 0; col < initialColumns; col++) {
                        for (let r = 10; r >= 1; r--) {
                            const row = wallContainer.querySelector(`[data-row-index="${r}"]`);
                            const slot = row.children[col];
                            if (slot.classList.contains('empty')) {
                                targetSlot = slot;
                                break;
                            }
                        }
                        if (targetSlot) break;
                    }

                    // Fill the slot with the ledger data
                    if (targetSlot) {
                        targetSlot.classList.remove('empty');
                        targetSlot.classList.add('filled');
                        targetSlot.setAttribute('data-full-name', item.name);
                        targetSlot.setAttribute('data-years', item.years);
                        targetSlot.setAttribute('data-section', item.section);
                        
                        const nameDiv = document.createElement('div');
                        nameDiv.className = 'name';
                        nameDiv.textContent = shortName;
                        targetSlot.appendChild(nameDiv);
                    }
                });
            })
            .catch(err => console.error("Error reading ledger data:", err));

        // 3. Handle Interactive Clicks
        wallContainer.addEventListener('click', (e) => {
            const brick = e.target.closest('.brick-slot.filled');
            if (brick) {
                const name = brick.getAttribute('data-full-name');
                const years = brick.getAttribute('data-years');
                const section = brick.getAttribute('data-section');

                modalName.textContent = name;
                modalDates.textContent = years;
                
                // Show a pet emoji if it's from the animal section!
                modalIcon.textContent = (section === 'animal') ? '🐾' : '🕊️';
                
                viewModal.classList.add('active');
            }
        });

        closeViewBtn.addEventListener('click', () => viewModal.classList.remove('active'));
        window.addEventListener('click', (e) => { if (e.target === viewModal) viewModal.classList.remove('active'); });
    </script>
</body>
</html>
