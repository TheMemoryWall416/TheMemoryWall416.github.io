<body>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
       
        const SUPABASE_URL = 'https://supabase.com/dashboard/project/yojxagqrxpjuwjanczah/settings/general'; 
        const SUPABASE_KEY = 'yojxagqrxpjuwjanczah'; 
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadWall() {
            const { data } = await supabase.from('bricks').select('*').eq('status', 'approved');
            console.log("Wall loaded:", data);
        }
        loadWall();
    </script>
