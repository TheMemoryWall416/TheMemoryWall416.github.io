<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Memory Wall</title>
    <style>
        body { margin: 0; padding: 0; background-color: #0b0b0c; color: #ffffff; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        header { text-align: center; padding: 20px; max-width: 800px; }
        h1 { font-size: 1.8rem; margin: 0 0 5px 0; letter-spacing: 5px; color: #d1d1d1; }
        header p { color: #666666; font-size: 0.9rem; margin: 0 0 20px 0; }
        .controls-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 10px; }
        .wall-toggle-switch { display: flex; background-color: #16161a; border: 1px solid #33333b; padding: 4px; border-radius: 30px; }
        .toggle-btn { background: none; border: none; color: #888888; padding: 8px 20px; font-size: 0.85rem; font-weight: bold; border-radius: 20px; cursor: pointer; transition: all 0.2s ease; }
        .toggle-btn.active { background-color: #ffffff; color: #000000; }
        body.pet-mode-active .toggle-btn.active { background-color: #00ff88; color: #000000; }
        .add-brick-btn { background-color: #222227; color: #ffffff; border: 1px solid #444; padding: 8px 16px; font-size: 0.85rem; font-weight: bold; border-radius: 30px; cursor: pointer; transition: all 0.2s; }
        .add-brick-btn:hover { border-color: #00ff88; color: #00ff88; }
        .wall-viewport { width: 100%; max-width: 100vw; overflow-x: auto; padding: 40px 0; box-sizing: border-box; scroll-behavior: smooth; }
        .wall-container { display: flex; flex-direction: column; gap: 4px; padding: 0 50px; width: max-content; }
        .wall-row { display: flex; gap: 4px; }
        .wall-row:nth-child(even) { transform: translateX(32px); }
        .brick-slot { width: 60px; height: 26px; border-radius: 1px; box-sizing: border-box; transition: all 0.15s ease; }
        .brick-slot.empty { background-color: transparent; border: 1px dashed #1c1c22; }
        .brick-slot.filled { background: linear-gradient(135deg, #241e1c 0%, #161312 100%); border: 1px solid #2e2624; display: flex; justify-content: center; align-items: center; text-align: center; cursor: pointer; }
        .brick-slot.filled:hover { transform: scale(1.8); background: #ffffff; border-color: #ffffff; box-shadow: 0px 0px 15px rgba(255, 255, 255, 0.6); z-index: 100; }
        body.pet-mode-active .brick-slot.filled:hover { background: #00ff88; border-color: #ffffff; box-shadow: 0px 0px 15px rgba(0, 255, 136, 0.6); }
        .name { font-size: 0.45rem; color: #a0a0a0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; padding: 0 2px; pointer-events: none; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.85); display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.2s ease; z-index: 1000; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-card { background-color: #16161a; border: 1px solid #33333b; border-radius: 8px; width: 90%; max-width: 320px; padding: 25px; text-align: center; }
        form { display: flex; flex-direction: column; gap: 12px; text-align: left; margin-top: 15px; }
        label { font-size: 0.8rem; color: #aaaaaa; }
        input { background-color: #222227; border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; font-size: 0.9rem; }
        .submit-btn { background-color: #ffffff; color: black; border: none; padding: 10px; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        body.pet-mode-active .submit-btn { background-color: #00ff88; }
        .close-btn { background-color: #222227; color: #aaa; border: 1px solid #444; padding: 6px 15px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <h1>THE MEMORY WALL</h1>
        <div class="controls-container">
            <div class="wall-toggle-switch">
                <button class="toggle-btn active" id="humanWallBtn">Human Monument</button>
                <button class="toggle-btn" id="petWallBtn">Animal Wall</button>
            </div>
            <button class="add-brick-btn" id="openFormBtn">+ Add Brick</button>
        </div>
    </header>

    <div class="wall-viewport">
        <div class="wall-container" id="wallContainer">
            <div class="wall-row"></div><div class="wall-row"></div><div class="wall-row"></div><div class="wall-row"></div><div class="wall-row"></div>
            <div class="wall-row"></div><div class="wall-row"></div><div class="wall-row"></div><div class="wall-row"></div><div class="wall-row"></div>
        </div>
    </div>

    <div class="modal-overlay" id="viewModal">
        <div class="modal-card">
            <div id="modalIcon" style="font-size: 2rem;">🕊️</div>
            <h2 id="modalName" style="color:white; margin: 10px 0;">Name</h2>
            <div id="modalDates" style="color:#aaa; margin-bottom: 20px;">Years</div>
            <button class="close-btn" id="closeViewBtn">Close</button>
        </div>
    </div>

    <div class="modal-overlay" id="formModal">
        <div class="modal-card">
            <h3 id="formTitle">LAY A BRICK</h3>
            <form id="brickForm">
                <label>Full Name</label>
                <input type="text" id="inputName" required>
                <label>Years</label>
                <input type="text" id="inputYears" required>
                <button type="submit" class="submit-btn">Place onto Wall</button>
            </form>
            <button class="close-btn" id="closeFormBtn" style="width: 100%; margin-top: 10px;">Cancel</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // --- PUT YOUR KEYS HERE ---
        const SUPABASE_URL = 'https://supabase.com/dashboard/project/yojxagqrxpjuwjanczah/settings/general';
        const SUPABASE_KEY = 'yojxagqrxpjuwjanczah';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const wallContainer = document.getElementById('wallContainer');
        const formModal = document.getElementById('formModal');
        const viewModal = document.getElementById('viewModal');
        let currentSection = 'human';

        function buildBlankGridSlots() {
            wallContainer.querySelectorAll('.wall-row').forEach(row => {
                row.innerHTML = '';
                for(let i=0; i<60; i++) {
                    const slot = document.createElement('div');
                    slot.className = 'brick-slot empty';
                    row.appendChild(slot);
                }
            });
        }

        function findNextEmptySlot() {
            const slots = wallContainer.querySelectorAll('.brick-slot.empty');
            return slots.length > 0 ? slots[0] : null;
        }

        async function loadAndRenderWall() {
            buildBlankGridSlots();
            const { data } = await supabase
                .from('bricks')
                .select('*')
                .eq('status', 'approved')
                .eq('category', currentSection);
            
            if (data) {
                data.forEach(item => {
                    const slot = findNextEmptySlot();
                    if(slot) {
                        slot.classList.replace('empty', 'filled');
                        slot.innerHTML = `<div class="name">${item.name.substring(0,6)}</div>`;
                        slot.setAttribute('data-full-name', item.name);
                        slot.setAttribute('data-years', item.years);
                        slot.setAttribute('data-section', item.category);
                    }
                });
            }
        }

        document.getElementById('brickForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            await supabase.from('bricks').insert([{ 
                name: document.getElementById('inputName').value, 
                years: document.getElementById('inputYears').value, 
                category: currentSection, 
                status: 'pending' 
            }]);
            alert("Submitted! It will appear after approval.");
            formModal.classList.remove('active');
        });

        document.getElementById('humanWallBtn').onclick = () => { currentSection='human'; loadAndRenderWall(); };
        document.getElementById('petWallBtn').onclick = () => { currentSection='animal'; loadAndRenderWall(); };
        document.getElementById('openFormBtn').onclick = () => formModal.classList.add('active');
        document.getElementById('closeFormBtn').onclick = () => formModal.classList.remove('active');
        document.getElementById('closeViewBtn').onclick = () => viewModal.classList.remove('active');
        
        wallContainer.onclick = (e) => {
            const brick = e.target.closest('.filled');
            if(brick) {
                document.getElementById('modalName').textContent = brick.getAttribute('data-full-name');
                document.getElementById('modalDates').textContent = brick.getAttribute('data-years');
                viewModal.classList.add('active');
            }
        };

        loadAndRenderWall();
    </script>
</body>
</html>
