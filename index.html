<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Memory Wall</title>
    <style>
        body { margin: 0; background-color: #0b0b0c; color: #ffffff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-top: 20px; }
        
        /* The input styling */
        .input-area { margin-bottom: 40px; }
        input { padding: 10px; width: 250px; }
        button { padding: 10px 20px; cursor: pointer; }

        /* The grid wall styling */
        .wall-container { display: flex; flex-wrap: wrap; gap: 4px; padding: 20px; justify-content: center; max-width: 900px; }
        .brick { width: 100px; height: 50px; background-color: #222; border: 1px solid #444; 
                 display: flex; align-items: center; justify-content: center; 
                 font-size: 10px; color: #aaa; text-align: center; }
    </style>
</head>
<body>

    <h1>THE MEMORY WALL</h1>

    <div class="input-area">
        <input type="text" id="brickInput" placeholder="Add a memory...">
        <button onclick="addBrick()">Add to Wall</button>
    </div>

    <div class="wall-container" id="wall"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // REPLACE THESE WITH YOUR KEYS
        const SUPABASE_URL = 'https://yojxagqrxpjuwjanczah.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlvanhhZ3FyeHBqdXdqYW5jemFoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NjM0MDgsImV4cCI6MjA5NjMzOTQwOH0.QZds9Ssj0rJ2yMhLo9XTGENVa_DraETfiBfBa03FBaQ'; 
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadWall() {
            const { data, error } = await supabase.from('bricks').select('*');
            if (error) { console.error("Load Error:", error); return; }
            
            const wall = document.getElementById('wall');
            wall.innerHTML = ''; // Clear the grid
            
            data.forEach(item => {
                const div = document.createElement('div');
                div.className = 'brick';
                // Make sure your column name is exactly 'message'
                div.textContent = item.message; 
                wall.appendChild(div);
            });
        }

        async function addBrick() {
            const input = document.getElementById('brickInput');
            const { error } = await supabase.from('bricks').insert([{ message: input.value }]);
            if (error) { alert("Error: " + error.message); }
            else { input.value = ''; loadWall(); }
        }

        loadWall();
    </script>
</body>
</html>
