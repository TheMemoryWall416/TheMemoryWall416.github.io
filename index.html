<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Memory Wall</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0b0c;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- TOP LEFT NAVIGATION --- */
        .top-nav {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 20px;
            z-index: 10;
        }

        .nav-link {
            background: none;
            border: none;
            color: #666666;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
            transition: color 0.2s ease;
            padding: 0;
        }

        .nav-link:hover {
            color: #ffffff;
        }

        /* --- TOP RIGHT BUTTONS --- */
        .top-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
            z-index: 10;
        }

        .toggle-btn {
            background-color: #161618;
            border: 1px solid #2a2a2c;
            color: #88888b;
            padding: 10px 20px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }

        .toggle-btn.active {
            background-color: #ffffff;
            color: #000000;
            border-color: #ffffff;
        }

        .toggle-btn:not(.active):hover {
            border-color: #444446;
            color: #ffffff;
        }

        .add-btn {
            background-color: #161618;
            border: 1px solid #2a2a2c;
            color: #ffffff;
            padding: 10px 20px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            letter-spacing: 1px;
            transition: border-color 0.2s ease;
        }

        .add-btn:hover {
            border-color: #ffffff;
        }

        /* --- HEADER SECTION --- */
        header {
            text-align: center;
            margin-top: 100px;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: normal;
            letter-spacing: 2px;
            margin: 0 0 10px 0;
        }

        header p {
            color: #88888b;
            font-size: 0.95rem;
            letter-spacing: 1px;
            margin: 0 0 25px 0;
        }

        .live-counter {
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 1px;
            color: #ffffff;
            transition: color 0.3s ease;
        }

        /* --- SPOTLIGHT SYSTEM --- */
        .spotlight-wrapper {
            width: 100%;
            max-width: 1400px;
            display: flex;
            justify-content: center;
            margin-bottom: 50px;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .spotlight-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 15px;
            width: 100%;
        }

        .spotlight-card {
            background-color: #121214;
            border: 1px solid #222224;
            border-radius: 6px;
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            opacity: 0;
            transform: scale(0.95);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .spotlight-card.visible {
            opacity: 1;
            transform: scale(1);
        }

        .spotlight-card:hover {
            border-color: #444446;
        }

        .spotlight-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0.4;
            transition: opacity 0.3s ease;
        }

        .spotlight-card:hover img {
            opacity: 0.7;
        }

        .spotlight-info {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 15px;
            width: 100%;
            box-sizing: border-box;
        }

        .spotlight-name {
            font-size: 0.95rem;
            letter-spacing: 1px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .spotlight-years {
            font-size: 0.75rem;
            color: #88888b;
            letter-spacing: 1px;
        }

        /* --- CORE HORIZON GRID --- */
        .wall-wrapper {
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            padding-bottom: 30px;
            margin-bottom: 50px;
            display: flex;
            justify-content: flex-start;
            cursor: grab;
            scroll-behavior: smooth;
        }

        .wall-wrapper:active {
            cursor: grabbing;
        }

        .wall-wrapper::-webkit-scrollbar {
            height: 4px;
        }

        .wall-wrapper::-webkit-scrollbar-track {
            background: #0b0b0c;
        }

        .wall-wrapper::-webkit-scrollbar-thumb {
            background: #222224;
            border-radius: 2px;
        }

        .wall-wrapper::-webkit-scrollbar-thumb:hover {
            background: #444446;
        }

        .inner-scroll-container {
            display: flex;
            gap: 12px;
            padding-left: 40px;
            padding-right: 40px;
        }

        .grid-column {
            display: grid;
            grid-template-rows: repeat(4, 1fr);
            gap: 12px;
            height: 520px;
        }

        .brick-slot {
            width: 150px;
            height: 120px;
            background-color: #0e0e10;
            border: 1px solid #1a1a1c;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
            box-sizing: border-box;
            text-align: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .brick-slot.populated {
            background-color: #161618;
            border-color: #2a2a2c;
        }

        .brick-slot.populated:hover {
            border-color: #555558;
            background-color: #1c1c1f;
        }

        .brick-slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0.15;
            transition: opacity 0.2s ease;
        }

        .brick-slot.populated:hover img {
            opacity: 0.35;
        }

        .brick-content {
            position: relative;
            z-index: 2;
            width: 100%;
        }

        .brick-name {
            font-size: 0.8rem;
            letter-spacing: 1px;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .brick-dates {
            font-size: 0.65rem;
            color: #66666a;
            letter-spacing: 0.5px;
        }

        /* --- MODAL BASE SYSTEM --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(5, 5, 6, 0.85);
            backdrop-filter: blur(5px);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-window {
            background-color: #121214;
            border: 1px solid #2a2a2c;
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
            padding: 30px;
            box-sizing: border-box;
            position: relative;
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-window {
            transform: translateY(0);
        }
