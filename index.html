<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Memory Wall</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0b0c;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 20px;
            max-width: 800px;
        }

        h1 {
            font-size: 1.8rem;
            margin: 0 0 5px 0;
            letter-spacing: 5px;
            color: #d1d1d1;
        }

        header p {
            color: #666666;
            font-size: 0.9rem;
            margin: 0;
        }

        /* The Perfect Brick Wall Container */
        .wall-container {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .wall-row {
            display: flex;
            gap: 4px;
            width: 100%;
            justify-content: center;
        }

        /* Micro Full Brick */
        .brick {
            width: 60px;
            height: 26px;
            background: linear-gradient(135deg, #241e1c 0%, #161312 100%);
            border: 1px solid #2e2624;
            border-radius: 1px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-sizing: border-box;
            transition: all 0.1s ease;
        }

        .brick-half {
            width: 28px;
            height: 26px;
            background: linear-gradient(135deg, #1f1a18 0%, #12100f 100%);
            border: 1px solid #241e1d;
            border-radius: 1px;
            box-sizing: border-box;
        }

        /* Hover Effect */
        .brick:hover {
            transform: scale(1.8);
            background: #00ff88;
            border-color: #ffffff;
            box-shadow: 0px 0px 15px rgba(0, 255, 136, 0.6);
            cursor: pointer;
            z-index: 100;
        }

        .brick:hover .name {
            color: #000000;
            font-weight: bold;
        }

        .name {
            font-size: 0.45rem;
            letter-spacing: 0.2px;
            color: #a0a0a0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            padding: 0 2px;
            pointer-events: none;
        }

        /* --- POPUP MODAL STYLES --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1000;
        }

        /* When active, show the modal */
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background-color: #16161a;
            border: 1px solid #33333b;
            border-radius: 8px;
            width: 90%;
            max-width: 320px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-card {
            transform: translateY(0);
        }

        .modal-photo {
            width: 90px;
            height: 90px;
            background-color: #222227;
            border: 1px solid #444;
            border-radius: 50%;
            margin: 0 auto 15px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
        }

        .modal-name {
            font-size: 1.4rem;
            margin: 0 0 5px 0;
            color: #ffffff;
            letter-spacing: 1px;
        }

        .modal-dates {
            font-size: 0.9rem;
            color: #00ff88;
            margin: 0 0 20px 0;
            letter-spacing: 1px;
        }

        .close-btn {
            background-color: #222227;
            color: #aaaaaa;
            border: 1px solid #444;
            padding: 8px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.2s;
        }

        .close-btn:hover {
            background-color: #ff3344;
            color: #ffffff;
            border-color: #ff3344;
        }
    </style>
</head>
<body>

    <header>
        <h1>THE MEMORY WALL</h1>
        <p>Click a brick to view their memorial record.</p>
    </header>

    <div class="wall-container">
        <div class="wall-row">
            <div class="brick" data-full-name="John Doe" data-years="1950 - 2024"><div class="name">J.Doe</div></div>
            <div class="brick" data-full-name="Alice Smith" data-years="1965 - 2023"><div class="name">A.Smith</div></div>
            <div class="brick" data-full-name="Robert Johnson" data-years="1942 - 2025"><div class="name">R.Johns</div></div>
            <div class="brick" data-full-name="Michael Davis" data-years="1988 - 2021"><div class="name">M.Davis</div></div>
        </div>

        <div class="wall-row">
            <div class="brick-half"></div>
            <div class="brick" data-full-name="James Anderson" data-years="1981 - 2022"><div class="name">J.Ande</div></div>
            <div class="brick" data-full-name="Clara Taylor" data-years="1939 - 2016"><div class="name">C.Tayl</div></div>
            <div class="brick" data-full-name="David Thomas" data-years="1952 - 2021"><div class="name">D.Thom</div></div>
            <div class="brick-half"></div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-card">
            <div class="modal-photo">🕊️</div>
            <h2 class="modal-name" id="modalName">Name Placeholder</h2>
            <div class="modal-dates" id="modalDates">Years Placeholder</div>
            <button class="close-btn" id="closeBtn">Close</button>
        </div>
    </div>

    <script>
        const bricks = document.querySelectorAll('.brick');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalName = document.getElementById('modalName');
        const modalDates = document.getElementById('modalDates');
        const closeBtn = document.getElementById('closeBtn');

        // Open modal on click
        bricks.forEach(brick => {
            brick.addEventListener('click', () => {
                const fullName = brick.getAttribute('data-full-name');
                const years = brick.getAttribute('data-years');
                
                modalName.textContent = fullName;
                modalDates.textContent = years;
                
                modalOverlay.classList.add('active');
            });
        });

        // Close modal on button click
        closeBtn.addEventListener('click', () => {
            modalOverlay.classList.remove('active');
        });

        // Close modal if clicking outside the card
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) {
                modalOverlay.classList.remove('active');
            }
        });
    </script>

</body>
</html>
