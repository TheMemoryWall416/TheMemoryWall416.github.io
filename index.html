<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Memory Wall</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* --- CORE FOUNDATION --- */
        html, body { max-width: 100vw; overflow-x: hidden; width: 100%; margin: 0; padding: 0; background-color: #0b0b0c; color: #ffffff; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* --- NAVIGATION --- */
        .top-nav { position: absolute; top: 20px; left: 20px; display: flex; gap: 20px; z-index: 10; }
        .nav-link { background: none; border: none; color: #666666; font-size: 0.85rem; font-weight: bold; cursor: pointer; letter-spacing: 1px; transition: color 0.2s; padding: 0; }
        .nav-link:hover { color: #ffffff; }

        /* --- HEADER --- */
        header { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 1600px; padding: 20px; box-sizing: border-box; margin-top: 40px; margin-bottom: 25px; gap: 15px; }
        .spotlight-side { display: flex; gap: 12px; flex: 1; }
        .left-side { justify-content: flex-end; }
        .right-side { justify-content: flex-start; }
        .header-center { text-align: center; width: 100%; max-width: 480px; flex-shrink: 0; z-index: 2; }

        /* --- SPOTLIGHT CARDS --- */
        .spotlight-card { width: 135px; background-color: #16161a; border: 1px solid #33333b; border-radius: 8px; padding: 12px 8px; display: flex; flex-direction: column; align-items: center; text-align: center; transition: opacity 0.4s ease; opacity: 0; }
        .spotlight-card.visible { opacity: 1; }
        .spotlight-photo { width: 55px; height: 55px; background-color: #222227; border: 1px solid #444; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.4rem; margin-bottom: 8px; background-size: cover; background-position: center; }
        .spotlight-info { width: 100%; overflow: hidden; }
        .spotlight-title { font-size: 0.55rem; color: #666666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; font-weight: bold; }
        .spotlight-name { font-size: 0.85rem; font-weight: bold; color: #ffffff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
        .spotlight-dates { font-size: 0.65rem; color: #888888; }
        .volume-slider { width: 90%; margin-top: 6px; background: #222227; height: 4px; border-radius: 2px; -webkit-appearance: none; }
        .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; border-radius: 50%; background: #666666; cursor: pointer; }

        /* --- WALL CONTROLS --- */
        .controls-container { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-bottom: 10px; }
        .wall-toggle-switch { display: flex; background-color: #16161a; border: 1px solid #33333b; padding: 4px; border-radius: 30px; width: 100%; justify-content: space-between; }
        .toggle-btn { background: none; border: none; color: #888888; padding: 8px 15px; font-size: 0.75rem; font-weight: bold; border-radius: 20px; cursor: pointer; flex: 1; }
        .toggle-btn.active { background-color: #ffffff; color: #000000; }
        
        /* Theming for Active Buttons */
        body.rainbow-mode-active #rainbowWallBtn.active { background-color: #00ff88; color: #000000; }
        body.gentle-mode-active #gentleWallBtn.active { background-color: #ffbbdd; color: #000000; }
        
        .add-brick-btn { background-color: #222227; color: #ffffff; border: 1px solid #444; padding: 8px 24px; font-size: 0.85rem; font-weight: bold; border-radius: 30px; cursor: pointer; transition: all 0.2s; }
        .add-brick-btn:hover { border-color: #ffffff; color: #ffffff; }
        body.rainbow-mode-active .add-brick-btn:hover { border-color: #00ff88; color: #00ff88; }
        body.gentle-mode-active .add-brick-btn:hover { border-color: #ffbbdd; color: #ffbbdd; }
        
        /* --- WALL GRID --- */
        .wall-viewport { width: 100vw; max-width: 100%; overflow-x: auto; padding: 10px 0 30px 0; }
        .wall-container { display: flex; flex-direction: column; gap: 4px; padding: 0 50px; width: max-content; }
        .wall-row { display: flex; gap: 4px; }
        .wall-row:nth-child(even) { transform: translateX(32px); }
        .brick-slot { width: 60px; height: 26px; border-radius: 1px; flex-shrink: 0; position: relative; }
        .brick-slot.empty { border: 1px dashed #1c1c22; background-color: transparent; }
        .brick-slot.filled { background: linear-gradient(135deg, #241e1c 0%, #161312 100%); border: 1px solid #2e2624; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: all 0.15s ease; }
        
        /* Hover Effects for Bricks */
        .brick-slot.filled:hover { transform: scale(1.8); background: #ffffff; border-color: #ffffff; box-shadow: 0px 0px 15px rgba(255, 255, 255, 0.6); z-index: 100; }
        body.rainbow-mode-active .brick-slot.filled:hover { background: #00ff88; border-color: #ffffff; box-shadow: 0px 0px 15px rgba(0, 255, 136, 0.6); }
        body.gentle-mode-active .brick-slot.filled:hover { background: #ffbbdd; border-color: #ffffff; box-shadow: 0px 0px 15px rgba(255, 187, 221, 0.6); }
        .brick-slot.filled:hover .name { color: #000000; font-weight: bold; }

        .name { font-size: 0.45rem; color: #a0a0a0; white-space: nowrap; overflow: hidden; padding: 0 2px; pointer-events: none; }

        /* --- MODALS --- */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:flex; justify-content:center; align-items:center; opacity:0; pointer-events:none; z-index:1000; }
        .modal-overlay.active { opacity:1; pointer-events:auto; }
        .modal-card { background:#16161a; border:1px solid #33333b; border-radius:8px; width:90%; max-width:480px; padding:25px; max-height: 90vh; overflow-y: auto; text-align: center; }
        
        /* Form Inputs */
        form { display:flex; flex-direction:column; gap:14px; text-align:left; margin-top:15px; }
        .form-group-block { display: flex; flex-direction: column; gap: 6px; }
        .form-row-split { display: flex; gap: 10px; }
        .form-row-split div { flex: 1; }
        label { font-size: 0.8rem; color: #aaaaaa; font-weight: bold; margin-bottom: -4px; }
        input, select, textarea { background:#222227; border:1px solid #444; color:white; padding:10px; border-radius:4px; width:100%; box-sizing: border-box; }
        textarea { resize: vertical; min-height: 70px; }
        
        .submit-btn { background:#ffffff; color:black; border:none; padding:12px; border-radius:4px; font-weight: bold; cursor:pointer; margin-top: 10px; }
        body.rainbow-mode-active .submit-btn { background-color: #00ff88; }
        body.gentle-mode-active .submit-btn { background-color: #ffbbdd; }
        
        .close-btn { background:#222227; color:#aaa; border:1px solid #444; padding:10px; border-radius:4px; cursor:pointer; width:100%; margin-top:15px; }
        .close-btn:hover { background-color: #ff3344; color: white; border-color: #ff3344; }

    </style>
</head>
<body>

    <nav class="top-nav">
        <button class="nav-link" id="openAboutBtn">ABOUT</button>
        <button class="nav-link" id="openFounderBtn">VISION</button>
        <button class="nav-link" id="openContactBtn">CONTACT</button>
    </nav>

    <header>
        <div class="spotlight-side left-side">
            <div class="spotlight-card" id="spotlight0"><div class="spotlight-photo">🕊️</div><div class="spotlight-info"><div class="spotlight-title">Spotlight</div><div class="spotlight-name">...</div><div class="spotlight-dates">...</div></div></div>
            <div class="spotlight-card" id="spotlight1"><div class="spotlight-photo">🕊️</div><div class="spotlight-info"><div class="spotlight-title">Spotlight</div><div class="spotlight-name">...</div><div class="spotlight-dates">...</div></div></div>
            <div class="spotlight-card" id="spotlight2"><div class="spotlight-photo">🕊️</div><div class="spotlight-info"><div class="spotlight-title">Spotlight</div><div class="spotlight-name">...</div><div class="spotlight-dates">...</div></div></div>
        </div>

        <div class="header-center">
            <h1>THE MEMORY WALL</h1>
            <p>A global monument stretching infinitely into the horizon.</p>
            <div class="controls-container">
                <div class="wall-toggle-switch">
                    <button class="toggle-btn active" id="humanWallBtn">Lives Remembered</button>
                    <button class="toggle-btn" id="gentleWallBtn">Gentle Arrivals</button>
                    <button class="toggle-btn" id="rainbowWallBtn">Rainbow Bridge</button>
                </div>
                <button class="add-brick-btn" id="openFormBtn">+ Add Brick</button>
            </div>
            <div id="brickCounter" style="font-size: 0.9rem; font-weight: bold; margin-top: 10px; color: #ffffff;">Souls Honored: 0</div>
        </div>

        <div class="spotlight-side right-side">
            <div class="spotlight-card" id="spotlight3"><div class="spotlight-photo">🕊️</div><div class="spotlight-info"><div class="spotlight-title">Spotlight</div><div class="spotlight-name">...</div><div class="spotlight-dates">...</div></div></div>
            <div class="spotlight-card" id="spotlight4"><div class="spotlight-photo">🕊️</div><div class="spotlight-info"><div class="spotlight-title">Spotlight</div><div class="spotlight-name">...</div><div class="spotlight-dates">...</div></div></div>
            <div class="spotlight-card visible" id="spotlight5">
                <div class="spotlight-photo">🔇</div>
                <div class="spotlight-info">
                    <div class="spotlight-title">Atmosphere</div>
                    <div class="spotlight-name" style="font-size:0.7rem; color:#666;">Volume: Off</div>
                    <input type="range" class="volume-slider" min="0" max="100" value="0">
                </div>
            </div>
        </div>
    </header>

    <div class="wall-viewport" id="wallViewport"><div class="wall-container" id="wallContainer"></div></div>

    <div class="modal-overlay" id="formModal">
        <div class="modal-card">
            <h3 id="formTitle" style="margin: 0; letter-spacing: 1px; text-transform: uppercase;">LAY A BRICK</h3>
            <form id="brickForm">
                
                <div class="form-group-block">
                    <label>Full Name</label>
                    <input type="text" id="inputName" placeholder="e.g. Samuel Evans" required>
                </div>
                
                <div class="form-row-split">
                    <div class="form-group-block">
                        <label>Date of Birth</label>
                        <input type="text" id="inputDOB" placeholder="YYYY or MM/DD/YYYY">
                    </div>
                    <div class="form-group-block">
                        <label>Date of Death</label>
                        <input type="text" id="inputDOD" placeholder="YYYY or MM/DD/YYYY">
                    </div>
                </div>

                <div class="form-group-block">
                    <label>Country of Origin</label>
                    <select id="inputCountry">
                        <option value="" disabled selected>Select country...</option>
                        <option value="South Africa">South Africa</option>
                        <option value="United States">United States</option>
                        <option value="United Kingdom">United Kingdom</option>
                        <option value="Australia">Australia</option>
                    </select>
                </div>

                <div class="form-group-block">
                    <label>Biography / Life Story</label>
                    <textarea id="inputBio" placeholder="Share a few paragraphs detailing their journey, legacy, and who they were..."></textarea>
                </div>

                <button type="submit" class="submit-btn">Place onto Wall</button>
            </form>
            <button class="close-btn" id="closeFormBtn">Cancel</button>
        </div>
    </div>

    <div class="modal-overlay" id="viewModal">
        <div class="modal-card">
            <h2 id="modalName" style="color: white; margin-bottom: 5px;">Name</h2>
            <div id="modalDates" style="color: #aaaaaa; font-size: 0.9rem; margin-bottom: 15px;">Dates</div>
            <div id="modalCountry" style="color: #888888; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 20px;">Country</div>
            
            <div style="text-align: left; background: #0f0f11; padding: 15px; border-radius: 6px; border: 1px solid #222;">
                <div style="font-size: 0.75rem; color: #55555d; font-weight: bold; text-transform: uppercase; margin-bottom: 6px;">Biography</div>
                <div id="modalBio" style="color: #cccccc; font-size: 0.9rem; line-height: 1.5;"></div>
            </div>
            
            <button class="close-btn" id="closeViewBtn">Close</button>
        </div>
    </div>

    <script>
        /* ==========================================
           1. SUPABASE CONNECTION
           ========================================== */
        const SUPABASE_URL = 'https://cajspoanzahtrqugbkvp.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNhanNwb2FuemFodHJxdWdia3ZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1NDU2MjAsImV4cCI6MjA5NzEyMTYyMH0.zAvg8fef33RqYyUtQc9GpeZGP8NrkpkesKcx2cji1sg';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        /* --- CORE VARIABLES --- */
        const wallContainer = document.getElementById('wallContainer');
        let totalColumns = 0;
        let currentSection = 'human'; 
        let activeWallData = [];

        /* --- GRID LOGIC --- */
        function expandGridColumns(count) {
            const rows = wallContainer.querySelectorAll('.wall-row');
            rows.forEach(row => {
                for (let i = 0; i < count; i++) {
                    const slot = document.createElement('div');
                    slot.className = 'brick-slot empty';
                    row.appendChild(slot);
                }
            });
            totalColumns += count;
        }

        function buildBlankGridSlots() {
            totalColumns = 0;
            wallContainer.innerHTML = '';
            for (let i = 0; i < 10; i++) {
                const row = document.createElement('div');
                row.className = 'wall-row';
                wallContainer.appendChild(row);
            }
            expandGridColumns(60);
        }

        function findNextEmptySlot() {
            const rows = wallContainer.querySelectorAll('.wall-row');
            for (let col = 0; col < totalColumns; col++) {
                for (let r = 9; r >= 0; r--) { 
                    const slot = rows[r].children[col];
                    if (slot && slot.classList.contains('empty')) {
                        return slot;
                    }
                }
            }
            expandGridColumns(20);
            return findNextEmptySlot();
        }

        function populateSlot(slot, item) {
            if (!item || !item.name) return;
            
            const nameParts = item.name.trim().split(' ');
            let shortName = item.name;
            if (nameParts.length > 1) {
                shortName = nameParts[0][0] + '.' + nameParts[nameParts.length - 1].substring(0, 4);
            } else {
                shortName = item.name.substring(0, 6);
            }

            slot.classList.remove('empty');
            slot.classList.add('filled');
            slot.setAttribute('data-id', item.id);
            
            slot.innerHTML = '';
            const nameDiv = document.createElement('div');
            nameDiv.className = 'name';
            nameDiv.textContent = shortName;
            slot.appendChild(nameDiv);

            // Add click listener to open the view modal
            slot.addEventListener('click', () => {
                document.getElementById('modalName').textContent = item.name;
                document.getElementById('modalDates').textContent = `${item.dob || '...'} — ${item.dod || '...'}`;
                document.getElementById('modalCountry').textContent = item.country || 'Location Unknown';
                document.getElementById('modalBio').textContent = item.biography || 'No biography provided.';
                document.getElementById('viewModal').classList.add('active');
            });
        }

        /* --- FETCH FROM SUPABASE --- */
        async function loadAndRenderWall() {
            buildBlankGridSlots();
            activeWallData = [];
            
            try {
                const { data, error } = await supabase
                    .from('memorial_bricks')
                    .select('*')
                    .eq('section', currentSection)
                    .order('created_at', { ascending: true });

                if (error) throw error;

                if (data) {
                    activeWallData = data;
                    activeWallData.forEach(item => {
                        const targetSlot = findNextEmptySlot();
                        if (targetSlot) populateSlot(targetSlot, item);
                    });
                }
            } catch (error) {
                console.error("Supabase Fetch Error:", error.message);
            }

            const counterEl = document.getElementById('brickCounter');
            if (currentSection === 'human') {
                counterEl.textContent = `Lives Remembered: ${activeWallData.length}`;
                counterEl.style.color = '#ffffff';
            } else if (currentSection === 'rainbow') {
                counterEl.textContent = `Pets at the Bridge: ${activeWallData.length}`;
                counterEl.style.color = '#00ff88';
            } else if (currentSection === 'gentle') {
                counterEl.textContent = `Little Angels Remembered: ${activeWallData.length}`;
                counterEl.style.color = '#ffbbdd';
            }
        }

        /* --- NEW: INSERT INTO SUPABASE (FORM SUBMISSION) --- */
        document.getElementById('brickForm').addEventListener('submit', async function(e) {
            e.preventDefault(); // Stop the page from reloading

            const submitBtn = e.target.querySelector('.submit-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = "Placing Brick...";

            // Package up the data from the form
            const newBrickPayload = {
                section: currentSection,
                name: document.getElementById('inputName').value,
                dob: document.getElementById('inputDOB').value || null,
                dod: document.getElementById('inputDOD').value || null,
                country: document.getElementById('inputCountry').value || null,
                biography: document.getElementById('inputBio').value || null
            };

            try {
                // Send it to the database
                const { error } = await supabase
                    .from('memorial_bricks')
                    .insert([newBrickPayload]);

                if (error) throw error;

                // Success! Clean up and close the form
                alert("Success! Your entry has been permanently placed onto the global monument.");
                document.getElementById('brickForm').reset();
                document.getElementById('formModal').classList.remove('active');
                
                // Reload the wall instantly so the user sees their brick appear
                loadAndRenderWall(); 

            } catch (error) {
                console.error("Submission Error:", error.message);
                alert("There was an error placing your brick. Check your connection and try again.");
            } finally {
                // Reset the button
                submitBtn.disabled = false;
                submitBtn.textContent = "Place onto Wall";
            }
        });

        /* --- WALL SWITCHING LOGIC --- */
        const humanWallBtn = document.getElementById('humanWallBtn');
        const gentleWallBtn = document.getElementById('gentleWallBtn');
        const rainbowWallBtn = document.getElementById('rainbowWallBtn');

        humanWallBtn.addEventListener('click', () => {
            currentSection = 'human';
            document.body.classList.remove('rainbow-mode-active', 'gentle-mode-active');
            humanWallBtn.classList.add('active'); rainbowWallBtn.classList.remove('active'); gentleWallBtn.classList.remove('active');
            loadAndRenderWall();
        });

        rainbowWallBtn.addEventListener('click', () => {
            currentSection = 'rainbow';
            document.body.classList.remove('gentle-mode-active'); document.body.classList.add('rainbow-mode-active');
            rainbowWallBtn.classList.add('active'); humanWallBtn.classList.remove('active'); gentleWallBtn.classList.remove('active');
            loadAndRenderWall();
        });

        gentleWallBtn.addEventListener('click', () => {
            currentSection = 'gentle';
            document.body.classList.remove('rainbow-mode-active'); document.body.classList.add('gentle-mode-active');
            gentleWallBtn.classList.add('active'); humanWallBtn.classList.remove('active'); rainbowWallBtn.classList.remove('active');
            loadAndRenderWall();
        });

        /* --- EVENT LISTENERS --- */
        document.addEventListener('DOMContentLoaded', () => {
            loadAndRenderWall();
            document.getElementById('openFormBtn').addEventListener('click', () => document.getElementById('formModal').classList.add('active'));
            document.getElementById('closeFormBtn').addEventListener('click', () => document.getElementById('formModal').classList.remove('active'));
            document.getElementById('closeViewBtn').addEventListener('click', () => document.getElementById('viewModal').classList.remove('active'));
        });

    </script>
</body>
</html>
