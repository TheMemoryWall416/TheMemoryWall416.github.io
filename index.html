<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Memory Wall</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0b0c;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 20px;
            max-width: 800px;
        }

        h1 {
            font-size: 1.8rem;
            margin: 0 0 5px 0;
            letter-spacing: 5px;
            color: #d1d1d1;
        }

        header p {
            color: #666666;
            font-size: 0.9rem;
            margin: 0 0 15px 0;
        }

        .add-brick-btn {
            background-color: #00ff88;
            color: #000000;
            border: none;
            padding: 8px 16px;
            font-size: 0.85rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
        }

        .add-brick-btn:hover {
            transform: scale(1.05);
            background-color: #00cc6e;
        }

        /* Fixed Wall Container holding exactly 10 layers */
        .wall-container {
            width: 100%;
            max-width: 1000px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .wall-row {
            display: flex;
            gap: 4px;
            width: 100%;
            justify-content: center;
        }

        /* Alternating row shift for interlocking look */
        .wall-row:nth-child(even) {
            transform: translateX(32px);
        }

        /* Slots are ready-made spaces waiting for data */
        .brick-slot {
            width: 60px;
            height: 26px;
            border-radius: 1px;
            box-sizing: border-box;
            transition: all 0.15s ease;
        }

        /* An empty slot looks like a ghost/mortar outline */
        .brick-slot.empty {
            background-color: transparent;
            border: 1px dashed #222227;
        }

        /* Once filled, it turns into a real solid brick */
        .brick-slot.filled {
            background: linear-gradient(135deg, #241e1c 0%, #161312 100%);
            border: 1px solid #2e2624;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
        }

        .brick-slot.filled:hover {
            transform: scale(1.8);
            background: #00ff88;
            border-color: #ffffff;
            box-shadow: 0px 0px 15px rgba(0, 255, 136, 0.6);
            z-index: 100;
        }

        .brick-slot.filled:hover .name {
            color: #000000;
            font-weight: bold;
        }

        .name {
            font-size: 0.45rem;
            letter-spacing: 0.2px;
            color: #a0a0a0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            padding: 0 2px;
            pointer-events: none;
        }

        /* --- POPUP MODALS --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 1000;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background-color: #16161a;
            border: 1px solid #33333b;
            border-radius: 8px;
            width: 90%;
            max-width: 320px;
            padding: 25px;
            text-align: center;
        }

        form { display: flex; flex-direction: column; gap: 12px; text-align: left; margin-top: 15px; }
        label { font-size: 0.8rem; color: #aaaaaa; }
        input { background-color: #222227; border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; font-size: 0.9rem; }
        .submit-btn { background-color: #00ff88; color: black; border: none; padding: 10px; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        .modal-photo { width: 80px; height: 80px; background-color: #222227; border: 1px solid #444; border-radius: 50%; margin: 0 auto 15px auto; display: flex; justify-content: center; align-items: center; font-size: 2rem; }
        .modal-name { font-size: 1.4rem; margin: 0 0 5px 0; }
        .modal-dates { font-size: 0.9rem; color: #00ff88; margin: 0 0 20px 0; }
        .close-btn { background-color: #222227; color: #aaa; border: 1px solid #444; padding: 6px 15px; border-radius: 4px; cursor: pointer; }
        .close-btn:hover { background-color: #ff3344; color: white; }
    </style>
</head>
<body>

    <header>
        <h1>THE MEMORY WALL</h1>
        <p>A 10-layer monument building from the ground up.</p>
        <button class="add-brick-btn" id="openFormBtn">+ Add a Brick</button>
    </header>

    <div class="wall-container" id="wallContainer">
        <div class="wall-row" data-row-index="1"><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div></div>
        <div class="wall-row" data-row-index="2"><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div></div>
        <div class="wall-row" data-row-index="3"><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div></div>
        <div class="wall-row" data-row-index="4"><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div></div>
        <div class="wall-row" data-row-index="5"><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div></div>
        <div class="wall-row" data-row-index="6"><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div></div>
        <div class="wall-row" data-row-index="7"><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div></div>
        <div class="wall-row" data-row-index="8"><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div></div>
        <div class="wall-row" data-row-index="9"><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div></div>
        <div class="wall-row" data-row-index="10"><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div><div class="brick-slot empty"></div></div>
    </div>

    <div class="modal-overlay" id="viewModal">
        <div class="modal-card">
            <div class="modal-photo">🕊️</div>
            <h2 class="modal-name" id="modalName">Name</h2>
            <div class="modal-dates" id="modalDates">Years</div>
            <button class="close-btn" id="closeViewBtn">Close</button>
        </div>
    </div>

    <div class="modal-overlay" id="formModal">
        <div class="modal-card">
            <h3 style="margin: 0; letter-spacing: 1px;">LAY A NEW BRICK</h3>
            <form id="brickForm">
                <label>Full Name</label>
                <input type="text" id="inputName" placeholder="e.g. Samuel Evans" required>
                
                <label>Years</label>
                <input type="text" id="inputYears" placeholder="e.g. 1945 - 2026" required>
                
                <button type="submit" class="submit-btn">Place onto Wall</button>
            </form>
            <button class="close-btn" id="closeFormBtn" style="margin-top: 15px; width: 100%;">Cancel</button>
        </div>
    </div>

    <script>
        const wallContainer = document.getElementById('wallContainer');
        const viewModal = document.getElementById('viewModal');
        const formModal = document.getElementById('formModal');
        const modalName = document.getElementById('modalName');
        const modalDates = document.getElementById('modalDates');

        // Manage Form Overlay
        document.getElementById('openFormBtn').addEventListener('click', () => formModal.classList.add('active'));
        document.getElementById('closeFormBtn').addEventListener('click', () => formModal.classList.remove('active'));
        document.getElementById('closeViewBtn').addEventListener('click', () => viewModal.classList.remove('active'));

        // Handle clicking active bricks
        wallContainer.addEventListener('click', (e) => {
            const brick = e.target.closest('.brick-slot.filled');
            if (brick) {
                modalName.textContent = brick.getAttribute('data-full-name');
                modalDates.textContent = brick.getAttribute('data-years');
                viewModal.classList.add('active');
            }
        });

        // Bottom-to-Top Column Filling Routine
        document.getElementById('brickForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const name = document.getElementById('inputName').value;
            const years = document.getElementById('inputYears').value;

            // Shorten Display Name
            const nameParts = name.trim().split(' ');
            let shortName = name;
            if (nameParts.length > 1) {
                shortName = nameParts[0][0] + '.' + nameParts[nameParts.length - 1].substring(0, 4);
            } else {
                shortName = name.substring(0, 6);
            }

            // Find the correct target slot going bottom-to-top, left-to-right
            let targetSlot = null;
            const totalColumns = 12; // 12 columns per layer

            // Outer Loop: Move Column by Column (left to right)
            for (let col = 0; col < totalColumns; col++) {
                // Inner Loop: Search rows from bottom layer (RowIndex 10) up to top layer (RowIndex 1)
                for (let r = 10; r >= 1; r--) {
                    const row = wallContainer.querySelector(`[data-row-index="${r}"]`);
                    const slot = row.children[col];
                    
                    if (slot.classList.contains('empty')) {
                        targetSlot = slot;
                        break;
                    }
                }
                if (targetSlot) break; // Found our lowest empty spot in this column!
            }

            if (targetSlot) {
                // Transform the ghost slot into an active brick
                targetSlot.classList.remove('empty');
                targetSlot.classList.add('filled');
                targetSlot.setAttribute('data-full-name', name);
                targetSlot.setAttribute('data-years', years);
                
                const nameDiv = document.createElement('div');
                nameDiv.className = 'name';
                nameDiv.textContent = shortName;
                targetSlot.appendChild(nameDiv);
            } else {
                alert("This section of the monument is fully built!");
            }

            // Clean up and hide form
            document.getElementById('brickForm').reset();
            formModal.classList.remove('active');
        });

        // Click outside closes modals
        window.addEventListener('click', (e) => {
            if (e.target === viewModal) viewModal.classList.remove('active');
            if (e.target === formModal) formModal.classList.remove('active');
        });
    </script>
</body>
</html>
